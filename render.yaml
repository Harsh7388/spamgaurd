services:
  - type: web
    name: spamguard-backend
    env: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: >-
      pip install -r requirements.txt &&
      python -c "import nltk; nltk.download('stopwords'); nltk.download('wordnet'); nltk.download('omw-1.4'); nltk.download('punkt'); nltk.download('punkt_tab')"
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT app:app
    healthCheckPath: /health
    autoDeploy: true

  - type: static_site
    name: spamguard-frontend
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: >-
      npm install && npm run build
    staticPublishPath: dist
    env:
      - key: VITE_API_URL
        value: https://spamguard-backend.onrender.com
    autoDeploy: true
